//シャッフルアルゴリズム
function getshafl(kazu){
  var a = kazu;
  for (var i=0;i<a;i++){
      arr[i]=i;
  }
  while (a) {
      var j = Math.floor( Math.random() * a );
      var t = arr[--a];
      arr[a] = arr[j];
      arr[j] = t;
  }
}

//乱数の発生
function getRandom( min, max ) {
    var random = Math.floor( Math.random() * (max + 1 - min) ) + min;
    return random;
}

var trmax = 5, tdmax = 5, Nkai=0;
var mytable; // グローバルで保持
var boxColor=["red","deepskyblue","yellow","darkviolet","black","lime","orange"];
boxColor[7]=boxColor[getRandom(0,6)];
var kaihyoji=document.getElementById('kaisu');

function maketable() {
    var box1 = document.getElementById('box1');
    var data_table = '<table id="myTable"><tbody>';
    for (var i = 0; i < trmax; i++) {
        data_table += '<tr>';
        for (var j = 0; j < tdmax; j++) {
            // セルの中身を空文字以外にするとクリックしやすくなります
            //data_table += '<td>' + (i * tdmax + j + 1) + '</td>';
            data_table += '<td>　</td>';
        }
        data_table += '</tr>';
    }
    data_table += '</tbody></table>';
    box1.innerHTML = data_table;
}

function init() {
    maketable();
    mytable = document.getElementById("myTable");
    var n=0;

    for (var i = 0; i < mytable.rows.length; i++) {
        for (var j = 0; j < mytable.rows[i].cells.length; j++) {
            //mytable.rows[i].cells[j].id = i + "-" + j;
            mytable.rows[i].cells[j].id ='CL'+ n++;
            //mytable.rows[i].cells[j].innerHTML = mytable.rows[i].cells[j].id;
            //mytable.rows[i].cells[j].onclick = clicked;
        }
    }
    setOrigin();
}

//        this.style.backgroundColor = 'red';
//    } else {
//        this.style.backgroundColor = '';
//    }

function putColor(data){
    for (var i=0;i<data;i++){
        var dmy0=getRandom(0,24),dmy=document.getElementById('CL'+dmy0), dmy1=dmy.style.backgroundColor, dmy2=boxColor[getRandom(0,7)],dmy3;
        if (dmy1==dmy2){dmy2=""; dmy3=dmy1;} else {dmy3='';}
        if (Nkai != 0){
            dmy.style.backgroundColor = dmy2; // 1回目点灯
            setTimeout(() => dmy.style.backgroundColor = dmy3, 400); // 1回目消灯
            setTimeout(() => dmy.style.backgroundColor = dmy2, 800); // 2回目点灯
            setTimeout(() => dmy.style.backgroundColor = dmy3, 1200); // 2回目消灯
            setTimeout(() => dmy.style.backgroundColor = dmy2, 1600); // 元の色に戻す
            if (dmy2==""){dmy2='white';}
            var today=new Date();
            var today2=today.getFullYear() +'.'+ (today.getMonth()+1) +'.'+ today.getDate() +' '+ '日月火水木金土'.slice(today.getDay(),(today.getDay()+1)) +' '+ today.getHours() +':'+ today.getMinutes() +':'+ today.getSeconds();
            kaihyoji.innerHTML='Count.'+Nkai+' - '+(dmy0+1)+' - '+dmy2+' ( '+today2+' )'; //+' - '+ boxColor[7];
        }
        dmy.style.backgroundColor = dmy2;
        if (Nkai % 10 == 0){boxColor[7]=boxColor[getRandom(0,6)];}//Countが１０ごとに色の重心を変える
    }
}

function setOrigin() {
    // 5x5の真ん中(13番目)はインデックス12
    var cells = mytable.getElementsByTagName('td');
    var centerCell = cells[12]; 
    
    // 表全体の左上からの中心位置を計算
    const centerX = centerCell.offsetLeft + (centerCell.offsetWidth / 2);
    const centerY = centerCell.offsetTop + (centerCell.offsetHeight / 2);
    
    // 修正：mytableを使用
    mytable.style.transformOrigin = centerX + "px " + centerY + "px";
    //for (var i=0;i<getRandom(1,15);i++){putColor();}
    putColor(getRandom(1,15));
    
    // 実行：90度からスタートするように変更
    updateStartAngle();
}

function updateStartAngle() {
    var k=getRandom(0, 5) * 15 ;
    // CSS変数（--start-angle）だけを書き換える
    //mytable.style.setProperty('--start-angle', degrees + 'deg');
    mytable.style.setProperty('--start-angle', k + 'deg');
}


// 初期化実行
window.onload = init;

</script>
